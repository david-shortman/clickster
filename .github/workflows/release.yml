name: Release

# Cuts a GitHub Release with the narrowed store zips (Firefox AMO +
# Chrome Web Store) whenever the manifest version changes on main (or on
# demand). These are the activeTab + optional-host builds you upload to
# the stores — NOT the broad dev/E2E zip from `npm run build`.
on:
  push:
    branches: [main]
    paths: ["manifest.json"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: meta
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.meta.outputs.version }}" >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.exists.outputs.found == 'false'
        run: |
          npm run build:stores
          mv dist/clickster-firefox.zip "clickster-firefox-${{ steps.meta.outputs.version }}.zip"
          mv dist/clickster-chrome.zip "clickster-chrome-${{ steps.meta.outputs.version }}.zip"

      - if: steps.exists.outputs.found == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.meta.outputs.version }}" \
            "clickster-firefox-${{ steps.meta.outputs.version }}.zip" \
            "clickster-chrome-${{ steps.meta.outputs.version }}.zip" \
            --title "Clickster v${{ steps.meta.outputs.version }}" \
            --generate-notes
