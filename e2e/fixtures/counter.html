<!DOCTYPE html>
<html>
  <head>
    <title>Clickster E2E fixture</title>
    <style>
      button {
        display: block;
        width: 300px;
        height: 60px;
        margin: 20px;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <button id="one">Button One (<span id="count-one">0</span>)</button>
    <button id="two">Button Two (<span id="count-two">0</span>)</button>
    <div id="respawn-host">
      <button id="respawn">Respawn (<span id="count-respawn">0</span>)</button>
    </div>
    <!-- A canvas that only registers coordinate clicks (not element.click). -->
    <canvas id="game" width="200" height="120" style="margin: 20px"></canvas>
    <div>
      cookie clicks: <span id="count-game">0</span> · last:
      <span id="game-last">-</span>
    </div>
    <script>
      (function () {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#c97b30";
        ctx.beginPath();
        ctx.arc(100, 60, 40, 0, Math.PI * 2);
        ctx.fill();
        let gameClicks = 0;
        canvas.addEventListener("mousedown", (e) => {
          const r = canvas.getBoundingClientRect();
          const x = Math.round(e.clientX - r.left);
          const y = Math.round(e.clientY - r.top);
          document.getElementById("game-last").textContent = x + "," + y;
          // Only count clicks that land inside the cookie circle.
          if ((x - 100) * (x - 100) + (y - 60) * (y - 60) <= 40 * 40) {
            gameClicks += 1;
            document.getElementById("count-game").textContent =
              String(gameClicks);
          }
        });
      })();
    </script>
    <script>
      let one = 0;
      let two = 0;
      document.getElementById("one").addEventListener("click", () => {
        one += 1;
        document.getElementById("count-one").textContent = String(one);
      });
      document.getElementById("two").addEventListener("click", () => {
        two += 1;
        document.getElementById("count-two").textContent = String(two);
      });

      // #respawn is destroyed and recreated (a new node, same id and position)
      // every 1.5s, carrying its count — exercises stale refs (#12).
      function wireRespawn() {
        document.getElementById("respawn").addEventListener("click", () => {
          const span = document.getElementById("count-respawn");
          span.textContent = String(Number(span.textContent) + 1);
        });
      }
      wireRespawn();
      setInterval(() => {
        const host = document.getElementById("respawn-host");
        const carried =
          document.getElementById("count-respawn").textContent;
        host.innerHTML =
          '<button id="respawn">Respawn (<span id="count-respawn">' +
          carried +
          "</span>)</button>";
        wireRespawn();
      }, 1500);
    </script>
  </body>
</html>
