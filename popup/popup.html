<!DOCTYPE html>
<meta charset="utf-8" />
<style>
  body {
    background-color: #160644;
    font-family: Helvetica, sans-serif;
    color: #f4f0ff;
    width: 300px;
    border: 4px solid;
    border-image: linear-gradient(
      to bottom right,
      #b827fc 0%,
      #2c90fc 25%,
      #b8fd33 50%,
      #fec837 75%,
      #fd1892 100%
    );
    border-image-slice: 1;
    margin: 0;
    padding: 6px 12px 14px;
  }
  h2 {
    margin: 4px 0;
    font-family: "Courier New", Courier, monospace;
    font-size: 22px;
  }
  .divider {
    height: 2px;
    margin: 8px 0 14px;
    background-image: linear-gradient(
      to right,
      #b827fc,
      #2c90fc,
      #b8fd33,
      #fec837,
      #fd1892
    );
  }
  button {
    font-family: Helvetica, sans-serif;
    cursor: pointer;
  }
  .primary {
    width: 100%;
    background-color: #bf16ab;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 12px;
    font-size: 15px;
    margin: 4px 0;
  }
  .primary:hover {
    background-color: #a01290;
  }
  .ghost {
    width: 100%;
    background: transparent;
    color: #f4f0ff;
    border: 1px dashed rgba(255, 255, 255, 0.3);
    border-radius: 6px;
    padding: 9px;
    font-size: 13px;
    margin: 4px 0 10px;
  }
  #running-badge {
    margin-left: auto;
    font-size: 12px;
    background: #b8fd33;
    color: #160644;
    border-radius: 20px;
    padding: 2px 10px;
    font-weight: bold;
  }
  .target {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 10px;
    padding: 10px 11px;
    margin-bottom: 8px;
  }
  .target-head {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .target-label {
    font-weight: bold;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .icon-btn {
    background: transparent;
    border: none;
    color: #cfc8f5;
    font-size: 15px;
    padding: 2px 4px;
    line-height: 1;
  }
  .icon-btn:hover {
    color: #fff;
  }
  .remove-btn {
    margin-left: auto;
  }
  .target-stats {
    display: flex;
    gap: 14px;
    margin: 7px 0 8px;
    font-size: 12px;
    color: #cfc8f5;
  }
  .freq {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #9189c0;
  }
  .freq input {
    width: 44px;
    text-align: center;
    border: none;
    border-radius: 4px;
    padding: 3px;
    font-size: 12px;
  }
  #settings-btn {
    margin-left: auto;
    font-size: 16px;
  }
  #settings {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 10px;
    padding: 10px 11px;
    margin-bottom: 12px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 13px;
    color: #cfc8f5;
  }
  .setting-row input {
    width: 44px;
    text-align: center;
    border: none;
    border-radius: 4px;
    padding: 3px;
    font-size: 12px;
  }
  .hidden {
    display: none;
  }
</style>
<div id="content">
  <div style="display: flex; align-items: center; gap: 8px">
    <img src="../icons/32.png" width="26" height="26" alt="" />
    <h2>Clickster</h2>
    <span id="running-badge" class="hidden">running</span>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
  </div>
  <div class="divider"></div>

  <div id="settings" class="hidden">
    <div class="setting-row">
      <span>Default click rate</span>
      <span><input id="default-interval" type="number" min="1" /> s</span>
    </div>
  </div>

  <div id="empty-state">
    <button id="select-element-btn" class="primary">Select an element</button>
  </div>

  <div id="targets-list"></div>

  <div id="active-actions" class="hidden">
    <button id="add-target-btn" class="ghost">+ Add another target</button>
    <button id="start-btn" class="primary">Start</button>
    <button id="stop-btn" class="primary hidden">Stop</button>
  </div>
</div>
<script src="popup.js"></script>
